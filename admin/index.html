<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — SCW Cards</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>

<div class="page-header">
  <div class="logo-badge"><img src="../assets/logo.svg" alt="SCW" /></div>
  <div class="header-text">
    <h1>SCW Admin</h1>
    <p>Siam Cotton Wool — Digital Cards</p>
  </div>
  <a href="./new/" class="btn btn-primary btn-sm">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    เพิ่มพนักงาน
  </a>
  <button class="btn-icon" onclick="toggleSettings()" title="GitHub Token">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
  </button>
</div>

<div class="pat-wrapper" id="patWrapper">
  <div class="pat-panel">
    <label>GitHub Personal Access Token</label>
    <div class="pat-row">
      <input type="password" id="patInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
      <button class="btn btn-primary btn-sm" onclick="savePAT()">บันทึก</button>
    </div>
    <div class="pat-status" id="patStatus"></div>
    <div class="pat-note">
      Settings → Developer settings → Personal access tokens (fine-grained)<br>
      Permissions: <strong>Contents: Read and write</strong>
    </div>
  </div>
</div>

<div style="max-width:700px; margin:0 auto">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">นามบัตรพนักงาน</span>
      <span id="cardCount" style="font-size:12px; color:#bbb"></span>
    </div>
    <div id="cardList">
      <div class="loading-state">กำลังโหลด...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="./admin.js"></script>
<script>
window.addEventListener('load', loadCards);

async function loadCards() {
  if (!getPAT()) {
    document.getElementById('cardList').innerHTML = `
      <div class="empty-state">
        กรุณาตั้งค่า GitHub Token ก่อนค่ะ<br>
        <button onclick="toggleSettings()"
          style="margin-top:10px;padding:6px 14px;border-radius:7px;border:1px solid #dde8e2;
                 background:#fff;color:var(--green-dark);font-size:12px;cursor:pointer;font-family:inherit">
          ⚙ ตั้งค่า Token
        </button>
      </div>`;
    return;
  }

  try {
    const items   = await apiGet('card');
    const folders = items.filter(i => i.type === 'dir');

    if (folders.length === 0) {
      document.getElementById('cardList').innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M8 10h8M8 14h5"/>
          </svg>
          ยังไม่มีนามบัตรในระบบ —
          <a href="./new/" style="color:var(--green-dark)">เพิ่มพนักงานคนแรก</a>
        </div>`;
      return;
    }

    const cards = await Promise.all(folders.map(async (f) => {
      try {
        const data = await apiGet(`card/${f.name}/index.html`);
        const p    = parseCardData(b64decode(data.content));
        return { slug: f.name, ...(p || {}) };
      } catch { return { slug: f.name }; }
    }));

    document.getElementById('cardCount').textContent = `${cards.length} คน`;
    renderCards(cards);
  } catch (e) {
    const msg = e.status === 401
      ? 'Token ไม่ถูกต้องหรือหมดอายุค่ะ'
      : 'โหลดไม่ได้: ' + e.message;
    document.getElementById('cardList').innerHTML =
      `<div class="error-state" style="color:#c0392b">${msg}</div>`;
  }
}

function renderCards(cards) {
  const rows = cards.map(c => {
    const initial    = ((c.nameEN || c.slug) + '').charAt(0).toUpperCase();
    const liveURL    = `https://nonwork3.github.io/scw_card/card/${c.slug}/`;
    const nameTHHtml = c.nameTH ? `<div class="emp-name-th">${c.nameTH}</div>` : '';
    const meta       = [c.title, c.email].filter(Boolean).join(' · ');
    return `
      <div class="emp-row">
        <div class="emp-avatar">${initial}</div>
        <div class="emp-info">
          <div class="emp-name-en">${c.nameEN || c.slug}</div>
          ${nameTHHtml}
          <div class="emp-meta">${meta}</div>
        </div>
        <div class="emp-actions">
          <a href="${liveURL}" target="_blank" class="btn btn-secondary btn-sm" title="เปิดนามบัตร">
            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
          <a href="./edit/?slug=${c.slug}" class="btn btn-edit btn-sm">แก้ไข</a>
          <a href="./delete/?slug=${c.slug}" class="btn btn-danger btn-sm">ลบ</a>
        </div>
      </div>`;
  }).join('');
  document.getElementById('cardList').innerHTML = rows;
}
</script>
</body>
</html>
