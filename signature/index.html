<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ดาวน์โหลด Email Signature — Siam Cotton Wool</title>
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #f0f4f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .panel {
      width: 100%; max-width: 440px; background: #fff;
      border-radius: 18px; padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);
      text-align: center;
    }
    .logo { width: 48px; height: 48px; margin: 0 auto 16px; display: block; }
    h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .note {
      margin-top: 16px; padding: 12px 14px; border-radius: 11px;
      background: #E1F5EE; border: 1px solid #b8e0cc;
      font-size: 12.5px; color: #0F6E56; line-height: 1.6; text-align: center;
    }
    .note .one-line { white-space: nowrap; }
    @media (max-width: 420px) {
      .note .one-line { white-space: normal; }
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 20px; padding: 14px 16px;
      background: #0F6E56; color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    .btn:hover { background: #085041; }
    .btn:focus-visible { outline: 2px solid #1D9E75; outline-offset: 2px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn svg { width: 17px; height: 17px; stroke: #fff; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .state-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px 0; }
    .state-text { font-size: 13px; color: #767676; line-height: 1.6; }
    .state-text.error { color: #b91c1c; }
    .icon-error { width: 32px; height: 32px; stroke: #b91c1c; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2.5px solid #d8ece4; border-top-color: #0F6E56;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1f1d; }
      .panel { background: #242924; box-shadow: 0 2px 12px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.06); }
      h1 { color: #d4d4d4; }
      .note { background: #1c2b25; border-color: #2e3f37; color: #9FE1CB; }
      .btn:focus-visible { outline-color: #9FE1CB; }
      .state-text { color: #999999; }
      .state-text.error { color: #f87171; }
      .icon-error { stroke: #f87171; }
      .spinner { border-color: #2e3f37; border-top-color: #9FE1CB; }
    }
  </style>
</head>
<body>
  <main class="panel" id="panel" aria-live="polite">
    <div class="state-wrap" id="loading">
      <span class="spinner" aria-hidden="true"></span>
      <span class="state-text">กำลังโหลดข้อมูล...</span>
    </div>
  </main>

  <script src="../assets/signature.js"></script>
  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    let sigHtml = '';

    async function init() {
      if (!slug) { showError('ลิงก์นี้ไม่สมบูรณ์ครับ — กรุณาตรวจสอบลิงก์อีกครั้ง'); return; }
      try {
        const res = await fetch('../card/' + slug + '/index.html');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const html = await res.text();
        const p = parseCardData(html);
        if (!p) throw new Error('parse failed');

        sigHtml = generateSignature(p);
        render(p);
      } catch (e) {
        showError('ไม่พบนามบัตรของพนักงานคนนี้ครับ — ลิงก์อาจไม่ถูกต้องหรือนามบัตรถูกลบไปแล้ว');
      }
    }

    function render(p) {
      document.getElementById('panel').innerHTML = `
        <img class="logo" src="../assets/logo.png" alt="Siam Cotton Wool logo" />
        <h1>Email Signature${p.nameEN ? ' — ' + p.nameEN : ''}</h1>
        <div class="note">สำหรับ Outlook<br><span class="one-line">ดาวน์โหลดแล้วนำไปตั้งค่า Signature ได้เลยครับ</span></div>
        <button class="btn" type="button" id="btnDownload">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ดาวน์โหลด Signature
        </button>
      `;
      const btn = document.getElementById('btnDownload');
      const original = btn.innerHTML;
      btn.addEventListener('click', () => {
        downloadHtmlFile(sigHtml, 'signature-' + (p.slug || slug) + '.html');
        btn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> ดาวน์โหลดแล้ว';
        setTimeout(() => { btn.innerHTML = original; }, 2000);
      });
    }

    function showError(msg) {
      document.getElementById('panel').innerHTML = `
        <div class="state-wrap">
          <svg class="icon-error" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p class="state-text error">${msg}</p>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
